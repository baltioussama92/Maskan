# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — comma-separated origins, no trailing slash
# Production: https://maskan-app.vercel.app
# Local dev:  https://maskan-app.vercel.app,https://maskan-app.vercel.app
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN: https://maskan-app.vercel.app}

# Server — Render injects PORT automatically
server.port=${PORT:8080}

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Local uploads fallback (dev only — use Cloudinary in production)
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:maskan/properties}

# Mocean Verify (optional)
mocean.api.key=${MOCEAN_API_KEY:}
mocean.api.secret=${MOCEAN_API_SECRET:}
mocean.api.token=${MOCEAN_API_TOKEN:}
mocean.verify.brand=${MOCEAN_VERIFY_BRAND:Maskan}
mocean.dlr.enabled=${MOCEAN_DLR_ENABLED:false}
mocean.dlr.url=${MOCEAN_DLR_URL:}

# Email SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.debug=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}

# Production logging defaults
logging.level.com.maskan.api.service.MoceanSmsService=${LOGGING_LEVEL_COM_MASKAN_API_SERVICE_MOCEANSMSSERVICE:INFO}
logging.level.com.maskan.api.controller.MoceanWebhookController=${LOGGING_LEVEL_COM_MASKAN_API_CONTROLLER_MOCEANWEBHOOKCONTROLLER:INFO}
logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:WARN}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
logging.level.org.springframework.web.servlet.mvc.method.annotation=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_SERVLET_MVC_METHOD_ANNOTATION:WARN}
